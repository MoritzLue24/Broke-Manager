services:
    nginx:
        container_name: nginx
        image: nginx:1.29.8-alpine
        ports:
            - "80:80"
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            api:
                condition: service_healthy

    api:
        container_name: api
        build: ./Api
        image: api:latest
        restart: unless-stopped
        depends_on:
            mssql:
                condition: service_healthy
        environment:
            - ConnectionStrings__DefaultConnection=${DEFAULT_DB_CONNECTION}

    migrate:
        container_name: migrate
        image: api:latest
        restart: no
        depends_on:
            mssql:
                condition: service_healthy
        profiles:
            - migrate
        command: ["dotnet", "Api.dll", "--migrate"]
        environment:
            - ConnectionStrings__DefaultConnection=${DEFAULT_DB_CONNECTION}

    mssql:
        container_name: mssql
        image: mcr.microsoft.com/mssql/server:2022-latest
        ports:
            - "1433:1433"
        volumes:
            - mssql-data:/var/opt/mssql
        environment:
            - ACCEPT_EULA=Y
            - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
        healthcheck:
            test: [
                "CMD", "/opt/mssql-tools18/bin/sqlcmd", 
                "-S", "localhost", 
                "-U", "sa", 
                "-P", "${MSSQL_SA_PASSWORD}", 
                "-C", 
                "-Q", "SELECT 1"
            ]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 60s

    mssql-dev:
        container_name: mssql-dev
        image: mcr.microsoft.com/mssql/server:2022-latest
        ports:
            - "1432:1433"
        volumes:
            - mssql-dev-data:/var/opt/mssql
        profiles:
            - dev
        environment:
            - ACCEPT_EULA=Y
            - MSSQL_SA_PASSWORD=MyPassword123!
        healthcheck:
            test: [
                "CMD", "/opt/mssql-tools18/bin/sqlcmd", 
                "-S", "localhost", 
                "-U", "sa", 
                "-P", "MyPassword123!", 
                "-C", 
                "-Q", "SELECT 1"
            ]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 60s

volumes:
    mssql-data:
    mssql-dev-data: